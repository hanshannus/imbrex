# --- General File Hygiene ---
[[repos]]
repo = "builtin"

  [[repos.hooks]]
  id = "trailing-whitespace"

  [[repos.hooks]]
  id = "end-of-file-fixer"

  [[repos.hooks]]
  id = "check-yaml"

  [[repos.hooks]]
  id = "check-added-large-files"

  [[repos.hooks]]
  id = "check-toml"

  [[repos.hooks]]
  id = "check-merge-conflict"

# --- Security: Gitleaks ---
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"

  [[repos.hooks]]
  id = "gitleaks"

# --- Python: Ruff (Lint & Format) ---
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.6"

  [[repos.hooks]]
  id = "ruff"
  args = ["--fix"]

  [[repos.hooks]]
  id = "ruff-format"

# --- Type Checking: Mypy ---
[[repos]]
repo = "https://github.com/pre-commit/mirrors-mypy"
rev = "v1.19.1"

  [[repos.hooks]]
  id = "mypy"
  files = "^src/"
  args = ["--strict", "--ignore-missing-imports"]
  additional_dependencies = ["types-PyYAML"]

# --- Git History: Commitizen ---
[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.13.9" # Using a pinned version is safer than 'master'

  [[repos.hooks]]
  id = "commitizen"
  # This usually runs during 'commit-msg' stage
  stages = ["commit-msg"]

  [[repos.hooks]]
  id = "commitizen-branch"
  # Ensures branch names also follow your project's rules
  stages = ["pre-push"]
