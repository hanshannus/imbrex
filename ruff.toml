extend = "ruff_defaults.toml"

line-length = 88

# https://github.com/astral-sh/ruff/issues/8627
exclude = [".git", ".mypy_cache", ".ruff_cache", ".venv", "dist"]
extend-exclude = ["*.ipynb", ".idea/*"]

[format]
preview = true

[lint]
preview = true
select = [
    "E",
    "F",
    "W",
    "I",
    "D",
    "UP",
]
ignore = [
    "E203",
    "E266",
    "D1",
    "D203",
    "D212",
]

[lint.pycodestyle]
max-line-length = 100

# [lint.extend-per-file-ignores]

[lint.isort]
known-first-party = ["refix"]
